name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Make gradlew executable (Unix/macOS)
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build (Unix/macOS)
        if: runner.os != 'Windows'
        run: ./gradlew build

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\gradlew.bat build
