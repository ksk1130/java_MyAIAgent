plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

// グローバルに slf4j-simple を除外して、Logback を確実に使用する
configurations.all {
    exclude group: 'org.slf4j', module: 'slf4j-simple'
}

dependencies {
    // Use JUnit test framework.
    testImplementation libs.junit

    // This dependency is used by the application.
    implementation libs.jackson.databind

    // Guava: utility library (Strings, CharMatcher, Preconditions, etc.)
    implementation group: 'com.google.guava', name: 'guava', version: '33.5.0-jre'

    // LangChain / Provider SDKs: always enabled
    // Include LangChain4j artifacts
    implementation 'dev.langchain4j:langchain4j:1.12.2'
    implementation 'dev.langchain4j:langchain4j-open-ai:1.12.2'
    // Agentic Services: Sequential/Supervisor workflow patterns (Incubating)
    // Source: https://mvnrepository.com/artifact/dev.langchain4j/langchain4j-agentic
    implementation 'dev.langchain4j:langchain4j-agentic:1.12.2-beta22'

    // JSON Schema validation (networknt) for LLM responses
    implementation 'com.networknt:json-schema-validator:1.0.79'

    // Gson: JSON serialization/deserialization
    implementation 'com.google.code.gson:gson:2.10.1'

    // SLF4J API and Logback (recommended logging implementation)
    implementation 'org.slf4j:slf4j-api:2.0.7'
    runtimeOnly 'ch.qos.logback:logback-classic:1.4.8'

    // JLine3: 対話型CLIサポート（行編集・入力履歴・Ctrl+C/D対応）
    implementation libs.jline

    // Apache Derby: Pure Java Database (embedded)
    implementation libs.derby
    implementation libs.derbytools
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    // Define the main class for the application.
    // App.java が ChatCLI と AgentChatCLI の両方をサポートするエントリポイント
    mainClass = 'org.example.App'
    // Ensure JVM uses UTF-8 file.encoding so console output (Japanese) doesn't mojibake on Windows
    //applicationDefaultJvmArgs = ['-Dfile.encoding=UTF-8']
}

// COBOL 依存関係アナライザー実行タスク
task runCobolAnalyzer(type: JavaExec) {
    description = 'Run COBOL Dependency Analyzer'
    group = 'application'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'org.example.cobol.CobolDependencyAnalyzer'
    
    // コマンドラインから --args で指定されたパスを使用
    // 例: gradlew.bat app:runCobolAnalyzer --args="app/src/main/resources/cobol"
    if (project.hasProperty('appArgs')) {
        args project.appArgs
    } else {
        // デフォルトパス（app/ からの相対パス）
        args 'src/main/resources/cobol'
    }
    
    // ワーキングディレクトリをプロジェクトルートに設定
    workingDir project.rootDir
    // 明示的に logback の設定ファイルを指定して確実に読み込ませる
    jvmArgs = ["-Dlogback.configurationFile=${projectDir}/src/main/resources/logback.xml"]
}

// DatabaseQueryAgent テスト実行タスク
task runDatabaseQueryTest(type: JavaExec) {
    description = 'Test DatabaseQueryAgent with Derby DB'
    group = 'application'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'org.example.cobol.DatabaseQueryTest'
    
    // ワーキングディレクトリをプロジェクトルートに設定（Derby DB へアクセス）
    workingDir project.rootDir
}

// ハイブリッド統合デモ実行タスク
task runHybridAnalysisDemo(type: JavaExec) {
    description = 'Run Hybrid Analysis Demo (CobolDependencyAnalyzer + DatabaseQueryAgent)'
    group = 'application'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'org.example.cobol.HybridAnalysisDemo'
    
    if (project.hasProperty('appArgs')) {
        args project.appArgs.split()
    }
    
    workingDir project.rootDir
}

// 完全統合デモ実行タスク
task runIntegratedAnalysisDemo(type: JavaExec) {
    description = 'Run Complete Integrated Analysis Workflow (with CobolColumnImpactAgent)'
    group = 'application'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'org.example.cobol.IntegratedAnalysisDemo'
    
    if (project.hasProperty('appArgs')) {
        args project.appArgs.split()
    }
    
    workingDir project.rootDir
}

def osArch = System.getProperty('os.arch', '').toLowerCase()
def isArm64 = osArch.contains('aarch64') || osArch.contains('arm64')

tasks.register('createMinimalJRE', Exec) {
    description = 'Create minimal JRE with jlink for smaller footprint'
    group = 'distribution'

    // Compute paths and settings at configuration time to be configuration-cache safe
    def buildDirPath = project.buildDir
    def jreOutputDir = file("$buildDirPath/jre-minimal")
    def baseModules = 'java.base,jdk.crypto.ec,java.logging,jdk.unsupported,java.net.http'
    def modules = baseModules
    def javaHome = System.getenv('JAVA_HOME') ?: System.getProperty('java.home')
    if (!javaHome) {
        throw new GradleException('JAVA_HOME environment variable not set')
    }
    def jmodsPath = file(new File(javaHome, 'jmods').absolutePath)
    if (!jmodsPath.exists()) {
        throw new GradleException("jmods directory not found at: ${jmodsPath.absolutePath}")
    }

    // Configure the Exec task to run jlink
    executable = new File(javaHome, 'bin/jlink.exe').absolutePath
    args = [
        '--module-path', jmodsPath.absolutePath,
        '--add-modules', modules,
        '--output', jreOutputDir.absolutePath,
        '--compress', '2',
        '--strip-debug',
        '--no-header-files',
        '--no-man-pages'
    ]

    doFirst {
        if (jreOutputDir.exists()) {
            logger.lifecycle("Removing existing JRE directory...")
            jreOutputDir.deleteDir()
        }
        jreOutputDir.parentFile.mkdirs()
        logger.lifecycle("Creating minimal JRE with jlink...")
        logger.lifecycle("Modules: ${modules}")
        logger.lifecycle("Using jmods from: ${jmodsPath.absolutePath}")
        logger.lifecycle("Output directory: ${jreOutputDir.absolutePath}")
    }

    doLast {
        logger.lifecycle('✓ Minimal JRE created successfully')
    }
}

tasks.register('prepareJPackageInput', Copy) {
    description = 'Prepare input directory for jpackage'
    group = 'distribution'
    dependsOn tasks.named('jar')
    into("$buildDir/package-input")

    // Copy the built jar and runtime dependencies into package-input (use providers to be configuration-cache safe)
    from(tasks.named('jar').flatMap { it.archiveFile }) {
        into '.'
    }
    from(configurations.runtimeClasspath)

    def packageInputPath = "${project.buildDir.absolutePath}/package-input"

    doLast {
        logger.lifecycle("✓ jpackage input prepared: ${packageInputPath}")
    }
}

tasks.register('createPortablePackage') {
    description = 'Create portable app package with JRE (batch launcher)'
    group = 'distribution'
    dependsOn tasks.named('build'), tasks.named('createMinimalJRE'), tasks.named('prepareJPackageInput')

    def buildDirPath = project.buildDir.absolutePath
    def packageInputDir = file("$buildDirPath/package-input")
    def jreOutputDir = file("$buildDirPath/jre-minimal")
    def appPackageDir = file("$buildDirPath/distribution/app")
    def libDir = file("$appPackageDir/lib")
    def jreDir = file("$appPackageDir/jre")

    doLast {
        logger.lifecycle('Creating portable app package...')
        appPackageDir.mkdirs()
        libDir.mkdirs()
        logger.lifecycle("Output directory: ${appPackageDir.absolutePath}")

        // Copy JAR files
        logger.lifecycle('Copying JAR files...')
        packageInputDir.listFiles()?.each { file ->
            if (file.name.endsWith('.jar')) {
                java.nio.file.Files.copy(
                    file.toPath(),
                    new File(libDir, file.name).toPath(),
                    java.nio.file.StandardCopyOption.REPLACE_EXISTING
                )
            }
        }

        // Copy JRE
        logger.lifecycle('Copying JRE (this may take a moment)...')
        ant.copy(todir: jreDir, overwrite: true) {
            fileset(dir: jreOutputDir)
        }

        // Create launcher script - Generate a simple launcher that works with portable JRE
        def runBat = new File(appPackageDir, 'run.bat')
        def batContent = """@echo off
REM Launch script for MyAIAgent with embedded JRE
REM 使い方:
REM   run.bat chat           - ChatCLI 対話モード（従来版）
REM   run.bat agent chat     - AgentChatCLI 対話モード（Agent対応版）
REM   run.bat <message>      - 単発メッセージモード

setlocal enabledelayedexpansion

REM Get the directory where this script is located
for /f "delims=" %%i in ('cd') do set SCRIPT_DIR=%%i

REM Set paths
set JRE_DIR=%SCRIPT_DIR%\\jre
set JAVA_EXE=%JRE_DIR%\\bin\\java.exe
set LIB_DIR=%SCRIPT_DIR%\\lib

REM Check if JRE exists
if not exist "%JAVA_EXE%" (
    echo エラー: JREが見つかりません: %JAVA_EXE%
    pause
    exit /b 1
)

REM Build classpath from all JARs in lib directory
setlocal enabledelayedexpansion
set CLASSPATH=
for %%f in ("%LIB_DIR%\\*.jar") do (
    if "!CLASSPATH!"=="" (
        set "CLASSPATH=%%f"
    ) else (
        set "CLASSPATH=!CLASSPATH!;%%f"
    )
)

REM Launch application with UTF-8 encoding
REM メインクラスは org.example.App （ChatCLI/AgentChatCLI をルーティング）
if "%%1"=="" (
    echo ChatCLI を対話モードで起動します...
    "%JAVA_EXE%" -Dfile.encoding=UTF-8 -cp "!CLASSPATH!" org.example.App chat
) else (
    echo アプリケーションを起動します: %*
    "%JAVA_EXE%" -Dfile.encoding=UTF-8 -cp "!CLASSPATH!" org.example.App %*
)

endlocal
"""
        runBat.text = batContent
        logger.lifecycle("✓ Launcher script created: ${runBat.absolutePath}")

        // Create README - prefer scripts/README.txt if present
        def readmeTxt = new File(appPackageDir, 'README.txt')
        def readmeSource = new File(projectDir, 'scripts/README.txt')
        if (readmeSource.exists()) {
            readmeTxt.text = readmeSource.text
            logger.lifecycle("✓ README created: ${readmeTxt.absolutePath}")
        } else {
            logger.lifecycle('INFO: No scripts/README.txt found; skipping README creation.')
        }

        logger.lifecycle("""
========================================
✓ ポータブルパッケージ作成完了
========================================
出力先: ${appPackageDir.absolutePath}
起動方法: run.bat をダブルクリック、または cmd で run.bat を実行
========================================
""")
    }
}

task printDistributionInfo {
    description = 'Show distribution package information'
    group = 'distribution'
    doLast {
        println """
配布用パッケージ作成タスク:
    gradle createPortablePackage : ポータブル版パッケージ作成（JRE同梱、run.bat起動）

実行例:
    gradle createPortablePackage

出力先:
    build/distribution/app/

特徴:
    - run.bat でアプリケーション起動（JRE 同梱）
    - インストール不要でそのまま実行可能
    - jlink で生成された最小限の JRE
    - 不要なモジュール/ドキュメントを除外
    - フットプリント最小化
""".stripIndent()
    }
}

