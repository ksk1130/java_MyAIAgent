 */

plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit test framework.
    testImplementation libs.junit

    // This dependency is used by the application.
    implementation libs.jackson.databind

    // LangChain / Provider SDKs: always enabled
    // Include LangChain4j artifacts
    implementation 'dev.langchain4j:langchain4j:1.12.2'
    implementation 'dev.langchain4j:langchain4j-open-ai:1.12.2'

    // Add AiServices support (should be included in langchain4j)

    // JSON Schema validation (networknt) for LLM responses
    implementation 'com.networknt:json-schema-validator:1.0.79'

    // Provide a simple SLF4J binding so LangChain4j logs are visible
    runtimeOnly 'org.slf4j:slf4j-simple:2.0.7'
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    // Define the main class for the application.
    // Changed to start the ChatCLI entrypoint so chat commands are handled.
    mainClass = 'org.example.ChatCLI'
    // Ensure JVM uses UTF-8 file.encoding so console output (Japanese) doesn't mojibake on Windows
    applicationDefaultJvmArgs = ['-Dfile.encoding=UTF-8']
}
